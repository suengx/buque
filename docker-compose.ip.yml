# 无备案域名、IP 访问：HTTP only，由 SITE_URL 驱动 CORS 与前端构建参数。
# 与 1Panel 同机时若 80 被占用，将 caddy.ports 改为 "8080:80"，SITE_URL=http://<IP>:8080
x-backend-env: &backend-env
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-buque}:${POSTGRES_PASSWORD:-buque}@postgres:5432/${POSTGRES_DB:-buque}
  CORS_ORIGINS: ${SITE_URL:?set SITE_URL}
  API_RELOAD: "false"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-buque}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buque}
      POSTGRES_DB: ${POSTGRES_DB:-buque}
      TZ: Asia/Shanghai
    volumes:
      - buque_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buque} -d ${POSTGRES_DB:-buque}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: ./backend
    env_file: .env
    environment:
      <<: *backend-env
    command: ["python", "scripts/init_db.py"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *backend-env
    volumes:
      - buque_data:/app/data
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  scheduler:
    build:
      context: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *backend-env
    command: ["buque-scheduler"]
    volumes:
      - buque_data:/app/data
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${SITE_URL:?set SITE_URL}/api/v1
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        VITE_AUTH_PASSWORD_ENABLED: ${AUTH_PASSWORD_ENABLED:-true}
    restart: unless-stopped
    environment:
      PORT: "3000"
    depends_on:
      api:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/Caddyfile.ip:/etc/caddy/Caddyfile:ro
    depends_on:
      - api
      - web

volumes:
  buque_pg_data:
  buque_data:
