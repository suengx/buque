name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "short_sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "registry=ghcr.io/${owner}" >> "$GITHUB_OUTPUT"
          echo "backend_image=ghcr.io/${owner}/buque-backend" >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/${owner}/buque-web" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push buque-backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_image }}:main
            ${{ steps.meta.outputs.backend_image }}:sha-${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push buque-web
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.web_image }}:main
            ${{ steps.meta.outputs.web_image }}:sha-${{ steps.meta.outputs.short_sha }}
          build-args: |
            VITE_API_BASE_URL=${{ secrets.SITE_URL }}/api/v1
            VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            VITE_AUTH_PASSWORD_ENABLED=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
