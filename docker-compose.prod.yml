# 生产栈：.env 保持开发默认值即可；下列 x-backend-env / web build args 按 DOMAIN 自动覆盖。
x-backend-build-args: &backend-build-args
  DOCKER_REGISTRY_PREFIX: ${DOCKER_REGISTRY_PREFIX}
  DEBIAN_APT_MIRROR: ${DEBIAN_APT_MIRROR:-}
  UV_INDEX_URL: ${UV_INDEX_URL:-}
  PLAYWRIGHT_DOWNLOAD_HOST: ${PLAYWRIGHT_DOWNLOAD_HOST:-}
  PLAYWRIGHT_DOWNLOAD_BASE_URL: ${PLAYWRIGHT_DOWNLOAD_BASE_URL:-}

x-frontend-build-args: &frontend-build-args
  DOCKER_REGISTRY_PREFIX: ${DOCKER_REGISTRY_PREFIX}
  DEBIAN_APT_MIRROR: ${DEBIAN_APT_MIRROR:-}
  NPM_REGISTRY: ${NPM_REGISTRY:-}

x-backend-build: &backend-build
  context: ./backend
  args:
    <<: *backend-build-args

x-backend-env: &backend-env
  POSTGRES_HOST: postgres
  CORS_ORIGINS: https://${DOMAIN:?set DOMAIN}
  API_RELOAD: "false"

services:
  postgres:
    image: ${DOCKER_REGISTRY_PREFIX}postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-buque}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buque}
      POSTGRES_DB: ${POSTGRES_DB:-buque}
      TZ: Asia/Shanghai
    volumes:
      - buque_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buque} -d ${POSTGRES_DB:-buque}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      <<: *backend-build
    env_file: .env
    environment:
      <<: *backend-env
    command: ["python", "scripts/init_db.py"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      <<: *backend-build
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *backend-env
    volumes:
      - buque_data:/app/data
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  scheduler:
    build:
      <<: *backend-build
    restart: unless-stopped
    env_file: .env
    environment:
      <<: *backend-env
    command: ["buque-scheduler"]
    volumes:
      - buque_data:/app/data
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      args:
        <<: *frontend-build-args
        VITE_API_BASE_URL: https://${DOMAIN:?set DOMAIN}/api/v1
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        VITE_AUTH_PASSWORD_ENABLED: ${AUTH_PASSWORD_ENABLED:-true}
    restart: unless-stopped
    environment:
      PORT: "3000"
    depends_on:
      api:
        condition: service_healthy

  caddy:
    image: ${DOCKER_REGISTRY_PREFIX}caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

volumes:
  buque_pg_data:
  buque_data:
  caddy_data:
  caddy_config:
